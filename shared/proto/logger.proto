// 本文件用于生成全局日志 Logger 接口代码
// Server 测试脚本在 `go/logger/test` 下
// 测试生成 log 文件在 `go/logger/log/ot` 下
syntax = "proto3";
package loggerServer.v1;
option go_package = "loggerServer/v1";
import "google/protobuf/timestamp.proto";
enum LogLevel {
    LOG_LEVEL_UNSPECIFIED = 0;
    LOG_LEVEL_DEBUG = 1;
    LOG_LEVEL_INFO = 2;
    LOG_LEVEL_WARN = 3;
    LOG_LEVEL_ERROR = 4;
}
message LogRequest {
    LogLevel level = 1;     // 使用 LogLevel

    google.protobuf.Timestamp timestamp = 2;    // 不需要传，logger 决定

    string service = 3;     // 什么服务：apiserver-service, proctor-controller-service

    // for tracing
    int32 operationId = 4;  // 动词 id || 错误 id
    string traceId = 5;     // requestId 保证幂等性
    string userId = 6;      // 动作的发起者（用户）id

    string message = 7;     // 实际的信息

    // for http req
    string method = 8;      // 请求方法："GET"
    string path = 9;        // url
    int32 statusCode = 10;  // 状态码: 200
    int64 durationMS = 11;  // 处理时间：ms

    // for storage
    string entity_type  = 12;   // 处理的实体类型：exam, bank                
    string entity_id    = 13;   // 实体的 id 
    // service fields：其他可能的字段
    map<string, string> stringFields = 20;
    map<string, int64> intFields = 21;
    // error
    string errorMessage = 30;   // 错误信息 
    string stackTrace = 31;     // 详细堆栈信息
}
message LogResponse {
    bool success = 1;
    int32 errorCode = 2;
    string errorMessage = 3;
}
message BatchLogResponse {
    bool success = 1;
    int32 errorCode = 2;
    int64 errorPos = 3;
    string errorMessage = 4;
}
service LoggerService {
    // single log
    rpc Log(LogRequest) returns (LogResponse);
    // batch log (not implemented yet)
    rpc BatchLog(stream LogRequest) returns (BatchLogResponse);
}