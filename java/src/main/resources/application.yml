server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:stss_testing}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${MYSQL_TIMEZONE:Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名自动映射 (如 course_id 自动映射为 courseId)
  global-config:
    db-config:
      id-type: auto # 全局设置主键自增策略
      logic-delete-field: isDeleted # 全局逻辑删除字段
      logic-delete-value: 1
      logic-not-delete-value: 0

logger:
  grpc:
    host: ${LOGGER_GRPC_HOST:localhost}
    port: ${LOGGER_GRPC_PORT:50051}
    plaintext: ${LOGGER_GRPC_PLAINTEXT:true}
    timeout-ms: ${LOGGER_GRPC_TIMEOUT_MS:500}
    api-service-name: ${LOGGER_API_SERVICE_NAME:apiserver-service}
    proctor-service-name: ${LOGGER_PROCTOR_SERVICE_NAME:proctor-controller-service}

proctor:
  grpc:
    port: ${PROCTOR_GRPC_PORT:50080}
    enabled: ${PROCTOR_GRPC_ENABLED:true}
  controller:
    url: ${PROCTOR_CONTROLLER_URL:http://localhost:8081}
    enabled: ${PROCTOR_CONTROLLER_ENABLED:false}
  redis:
    enabled: ${PROCTOR_REDIS_ENABLED:true}
