version: '3.8'

services:
  # 题库 : MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: stss-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stss_testing       
      TZ: Asia/Shanghai                 
    volumes:
      - ./mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci